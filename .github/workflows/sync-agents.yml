name: Sync to trustedoss-agents

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "templates/**"
      - ".claude/skills/**"
      - ".claude/reference/**"
      - ".github/agents-repo/**"
  workflow_dispatch:

jobs:
  sync:
    name: Sync agents to trustedoss-agents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trustedoss
        uses: actions/checkout@v4

      - name: Clone trustedoss-agents
        env:
          AGENTS_REPO_TOKEN: ${{ secrets.AGENTS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${AGENTS_REPO_TOKEN}@github.com/trustedoss/trustedoss-agents.git /tmp/trustedoss-agents

      - name: Sync files
        run: |
          rsync -av --delete agents/    /tmp/trustedoss-agents/agents/
          rsync -av --delete templates/ /tmp/trustedoss-agents/templates/

          mkdir -p /tmp/trustedoss-agents/.claude/skills
          mkdir -p /tmp/trustedoss-agents/.claude/reference
          rsync -av --delete .claude/skills/     /tmp/trustedoss-agents/.claude/skills/
          rsync -av --delete .claude/reference/  /tmp/trustedoss-agents/.claude/reference/

          cp .github/agents-repo/README.md /tmp/trustedoss-agents/README.md
          cp .github/agents-repo/CLAUDE.md /tmp/trustedoss-agents/CLAUDE.md

      - name: Commit and push
        env:
          AGENTS_REPO_TOKEN: ${{ secrets.AGENTS_REPO_TOKEN }}
        run: |
          cd /tmp/trustedoss-agents
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${AGENTS_REPO_TOKEN}@github.com/trustedoss/trustedoss-agents.git
          git add -A
          if [ -z "$(git status --porcelain)" ]; then
            echo "변경 없음 — sync 스킵"
          else
            git commit -m "sync: trustedoss@${{ github.sha }}"
            git push origin HEAD:main
          fi
